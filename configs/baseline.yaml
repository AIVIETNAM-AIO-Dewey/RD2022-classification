# Baseline Configuration (Resize + Normalization Only)

# Experiment name
exp_name: "baseline"

# Data paths
data_dir: "data/processed"
output_dir: "outputs/baseline"

# Model parameters
model_name: "resnet18"
pretrained: false
num_classes: 4   # D00, D20, D40, Normal

# Training parameters
epochs: 30
batch_size: 64
learning_rate: 0.0005
weight_decay: 0.001
device: "cuda"   # "cuda" or "cpu"
use_weighted_sampler: true

# Learning rate scheduler
use_scheduler: true
scheduler_T_max: 30                  # T_max for CosineAnnealingLR (usually equal to total epochs)
scheduler_eta_min: 0.000001          # Minimum learning rate (eta_min) for CosineAnnealingLR


# Preprocessing parameters
image_size: 224
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

# Preprocessing Flags
use_clahe: false
use_blur: false
use_augmentation: false
