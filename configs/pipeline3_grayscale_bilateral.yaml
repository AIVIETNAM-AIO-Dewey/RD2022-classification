# Pipeline 3: Baseline + Grayscale + Bilateral Filter

exp_name: "pipeline3_grayscale_bilateral"

data_dir: "data/processed"
output_dir: "outputs/pipeline3_grayscale_bilateral"

model_name: "resnet18"
pretrained: false
num_classes: 4

epochs: 30
batch_size: 64
learning_rate: 0.001
weight_decay: 0.0001
device: "cuda"

# Learning rate scheduler
use_scheduler: true
scheduler_T_max: 30
scheduler_eta_min: 0.000001

# Early stopping
early_stopping_patience: 5

image_size: 224
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

preprocessing_mode: "grayscale_bilateral"

preprocessing_params:
  grayscale_bilateral:
    d: 9                          # Đường kính vùng lân cận pixel (5-9)
    sigma_color: 75               # Sigma không gian màu
    sigma_space: 75               # Sigma không gian tọa độ
