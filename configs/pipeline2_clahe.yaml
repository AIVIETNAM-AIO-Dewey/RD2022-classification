# Pipeline 2: Baseline + CLAHE

exp_name: "pipeline2_clahe"

data_dir: "data/processed"
output_dir: "outputs/pipeline2_clahe"

model_name: "resnet18"
pretrained: false
num_classes: 4

epochs: 30
batch_size: 64
learning_rate: 0.001
weight_decay: 0.0001
device: "cuda"

# Learning rate scheduler
use_scheduler: true
scheduler_T_max: 30
scheduler_eta_min: 0.000001

# Early stopping
early_stopping_patience: 5

image_size: 224
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

preprocessing_mode: "clahe"

preprocessing_params:
  clahe:
    clip_limit: 2.0               # Ngưỡng giới hạn contrast (1.0 - 4.0)
    tile_grid_size: [8, 8]        # Kích thước lưới chia ảnh
