# Pipeline 3: Baseline + Grayscale + Bilateral Filter (ĐÃ CHỈNH SỬA TỐI ƯU)

exp_name: "pipeline3_grayscale_bilateral"

data_dir: "data/processed"
output_dir: "outputs/pipeline3_grayscale_bilateral"

model_name: "resnet18"
pretrained: true                  # ĐÃ ĐỔI: Bật pretrained để tận dụng các bộ lọc cạnh có sẵn
num_classes: 4

epochs: 40                        # ĐÃ ĐỔI: Tăng số epoch để mô hình học kỹ hơn
batch_size: 64
learning_rate: 0.0005             # ĐÃ ĐỔI: Giảm tốc độ học giúp mô hình hội tụ tốt hơn
weight_decay: 0.0001
device: "cuda"

# Learning rate scheduler
use_scheduler: true
scheduler_T_max: 40               # ĐÃ ĐỔI: Khớp với số epochs mới (40)
scheduler_eta_min: 0.000001

# Early stopping
early_stopping_patience: 5

image_size: 224
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

preprocessing_mode: "grayscale_bilateral"

preprocessing_params:
  grayscale_bilateral:
    d: 5                          # ĐÃ ĐỔI: Giảm vùng lấy mẫu để bắt cạnh sắc nét hơn
    sigma_color: 20               # ĐÃ ĐỔI: Giảm mạnh để không làm xóa mờ các vết nứt nhỏ
    sigma_space: 20               # ĐÃ ĐỔI: Giảm mức độ làm mịn không gian