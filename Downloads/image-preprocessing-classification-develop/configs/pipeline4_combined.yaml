# Pipeline 4: Baseline + Kết hợp cả 3 kỹ thuật preprocessing (ĐÃ CHỈNH SỬA TỐI ƯU)

exp_name: "pipeline4_combined"

data_dir: "data/processed"
output_dir: "outputs/pipeline4_combined"

model_name: "resnet18"
pretrained: true                  # ĐÃ ĐỔI: Bật pretrained
num_classes: 4

epochs: 40                        # ĐÃ ĐỔI: Tăng số epoch
batch_size: 64
learning_rate: 0.0005             # ĐÃ ĐỔI: Giảm tốc độ học
weight_decay: 0.0001
device: "cuda"

# Learning rate scheduler
use_scheduler: true
scheduler_T_max: 40               # ĐÃ ĐỔI: Khớp với số epochs mới
scheduler_eta_min: 0.000001

# Early stopping
early_stopping_patience: 5

image_size: 224
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]

preprocessing_mode: "combined"

preprocessing_params:
  clahe:
    clip_limit: 2.0
    tile_grid_size: [8, 8]

  letterbox:
    border_mode: "constant"
    fill_value: [0, 0, 0]

  grayscale_bilateral:
    d: 5                          # ĐÃ ĐỔI: Giảm vùng lấy mẫu
    sigma_color: 20               # ĐÃ ĐỔI: Giảm mạnh làm mịn màu
    sigma_space: 20               # ĐÃ ĐỔI: Giảm mức độ làm mịn không gian